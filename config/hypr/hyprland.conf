monitor=,preferred,auto,1.5
monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1

exec-once = awww-daemon
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wallpaper-init
exec-once = udiskie

env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = EDITOR,nvim

input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    tap-to-click = true
    natural_scroll = true
    disable_while_typing = true
  }
  sensitivity = 0
}

general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  layout = master
  col.active_border = rgba(ffffffff)
  col.inactive_border = rgba(00000000)
}

decoration {
  rounding = 6
  blur {
    enabled = true
    size = 4
    passes = 2
    noise = 0.02
  }
  shadow {
    enabled = true
    range = 12
    color = rgba(00000066)
  }
}

animations {
  enabled = true
  bezier = smooth, 0.16, 1, 0.3, 1
  animation = windows, 1, 4, smooth, slide
  animation = fade, 1, 4, smooth
  animation = workspaces, 1, 4, smooth, slidevert
}

master {
  new_status = slave
  mfact = 0.55
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
}

$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q,      killactive
bind = $mod, M,      exit
bind = $mod, V,      togglefloating
bind = $mod, F,      fullscreen
bind = $mod, A,      exec, fuzzel
bind = $mod, W,      exec, wallpaper
bind = $mod, D,      exec, kitty -e yazi

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

bind = $mod, comma,  layoutmsg, addmaster
bind = $mod, period, layoutmsg, removemaster

binde = $mod ALT, l, resizeactive,  30 0
binde = $mod ALT, h, resizeactive, -30 0
binde = $mod ALT, k, resizeactive,  0 -30
binde = $mod ALT, j, resizeactive,  0  30

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioPlay,         exec, playerctl play-pause
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

source = ~/.cache/wal/hyprland-colors.conf
